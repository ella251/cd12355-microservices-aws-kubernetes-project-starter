version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 852856666844.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_REPO_NAME=analytics-app-v2
      - IMAGE_TAG=$CODEBUILD_BUILD_NUMBER

  build:
    commands:
      - echo Build started on `date`
      - docker build -t $IMAGE_REPO_NAME ./analytics
      - docker tag $IMAGE_REPO_NAME:latest 852856666844.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker tag $IMAGE_REPO_NAME:latest 852856666844.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_REPO_NAME:latest

  post_build:
    commands:
      - echo Pushing the Docker images...
      - docker push 852856666844.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - docker push 852856666844.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_REPO_NAME:latest
